<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <title>Tickets</title>
</h:head>

<ui:include src="/WEB-INF/includes/navbar.xhtml" />

<h:body>
    <h1>Tickets</h1>

    <h:dataTable value="#{ticketBean.tickets}" var="ticket" border="1">

        <h:column>
            <f:facet name="header">Event</f:facet>
            #{ticket.event.name}
        </h:column>

        <h:column>
            <f:facet name="header">Ticket Type</f:facet>
            #{ticket.ticketType.name}
        </h:column>

        <h:column>
            <f:facet name="header">Seat</f:facet>
            #{ticket.seat != null ? ticket.seat.section.concat(' - ').concat(ticket.seat.row).concat(' - ').concat(ticket.seat.number) : 'No seat'}
        </h:column>

        <h:column>
            <f:facet name="header">Status</f:facet>
            #{ticket.status}
        </h:column>

        <h:column>
            <f:facet name="header">QR code value</f:facet>
            #{ticket.QRCode.codeValue}
        </h:column>

    </h:dataTable>

</h:body>
</html>
