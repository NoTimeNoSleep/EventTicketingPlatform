<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Event Seats</title>
</h:head>

<h:body>
    <h1>Event Seats</h1>

    <h:dataTable value="#{eventSeatBean.eventSeats}" var="eventSeat" border="1">
        <h:column>
            <f:facet name="header">Event</f:facet>
            #{eventSeat.event.name}
        </h:column>

        <h:column>
            <f:facet name="header">Seat</f:facet>
            #{eventSeat.seat.section} - Row #{eventSeat.seat.row} - Seat #{eventSeat.seat.number}
        </h:column>

        <h:column>
            <f:facet name="header">Ticket Type</f:facet>
            #{eventSeat.ticketType.name}
        </h:column>

        <h:column>
            <f:facet name="header">Status</f:facet>
            #{eventSeat.status}
        </h:column>
    </h:dataTable>
</h:body>
</html>
