<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Roles</title>
</h:head>
<h:body>

    <h1>Roles</h1>

    <h:dataTable value="#{roleBean.roles}" var="role" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{role.id}
        </h:column>

        <h:column>
            <f:facet name="header">Type</f:facet>
            #{role.type}
        </h:column>
    </h:dataTable>

</h:body>
</html>
