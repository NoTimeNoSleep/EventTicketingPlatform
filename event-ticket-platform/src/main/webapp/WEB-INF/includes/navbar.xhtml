    <h:outputStylesheet library="css" name="navbar.css" />

    <h:form styleClass="navbar-wrapper">

                    <h:link outcome="/register.xhtml" value="Register" styleClass="action-link"/>
                </h:panelGroup>

                            styleClass="action-link"/>          <!--TODO: placeholder, change to user profile page-->
                    <h:commandLink value="Log Out"

                                   styleClass="action-link"/>
                </h:panelGroup>

        </nav>
