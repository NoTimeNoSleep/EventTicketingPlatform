<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <title>Cart</title>
    <h:outputStylesheet library="css" name="site.css" />
</h:head>

<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <main class="main-content">

        <section>
            <h1>Cart</h1>

            <!-- Display messages -->
            <h:messages globalOnly="true" />

            <h:panelGroup id="cart-expiry-panel" rendered="#{cartBean.cartTimed}">
                <h:outputText value="Cart expires in: " />
                <span class="cart-timer" data-cart-expiry="#{cartBean.cartExpiresAtEpochMillis}">#{cartBean.timeLeft}</span>
            </h:panelGroup>

            <h:form>
                <h:dataTable value="#{cartBean.cartItems}" var="item">
                    <h:column>
                        <f:facet name="header">Event</f:facet>
                        <h:link outcome="/events.xhtml" value="#{item.ticket.event.name}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Ticket Type</f:facet>
                        #{item.ticket.ticketType.name}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Price</f:facet>
                        #{item.price}
                    </h:column>
                    <h:column>
                        <h:commandButton value="Remove" action="#{cartBean.removeFromCart(item)}" immediate="true" />
                    </h:column>
                </h:dataTable>

                <h:panelGroup>
                    <h:outputText value="Total: " />
                    <h:outputText value="#{cartBean.totalPrice}" />
                </h:panelGroup>

                <h:panelGroup styleClass="checkout-step">
                    <h2>Enter Your Email</h2>
                    <h:panelGroup rendered="#{currentUserBean.loggedIn}">
                        <h:outputText value="Using logged-in email: " />
                        <h:outputText value="#{currentUserBean.email}" />
                    </h:panelGroup>

                    <h:panelGroup rendered="#{not currentUserBean.loggedIn}">
                        <h:outputLabel for="checkoutEmail" value="Enter your email:" />
                        <h:inputText id="checkoutEmail"
                                     value="#{cartBean.checkoutEmail}"
                                     required="true"
                                     requiredMessage="Email is required to continue to payment" />
                        <h:message for="checkoutEmail" styleClass="error-message" />
                    </h:panelGroup>
                </h:panelGroup>

                <h:panelGroup>
                    <h2>Pay</h2>
                    <h:commandButton value="Create order and proceed to payment"
                                     action="#{cartBean.checkout}"
                                     disabled="#{empty cartBean.cartItems}"
                                     immediate="false" />
                </h:panelGroup>
            </h:form>
        </section>
    </main>

    <ui:include src="/WEB-INF/includes/footer.xhtml" />
</h:body>
</html>
