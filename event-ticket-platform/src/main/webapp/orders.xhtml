<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Orders</title>
    <h:outputStylesheet library="css" name="site.css" />
    <h:outputStylesheet library="css" name="style.css"/>
    <h:outputStylesheet library="css" name="index.css"/>
    <h:outputStylesheet library="css" name="events.css"/>
</h:head>

<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <main class="main-content">
        <div class="container">

            <section class="section">
                <h1>Orders</h1>
                <p class="muted">Create a new order or view existing ones.</p>
            </section>
            
            <section class="card">
                <h2>All orders</h2>

                <h:panelGroup rendered="#{orderBean.orders.isEmpty()}">
                    <p class="muted" style="text-align: center; padding: 2rem 0;">
                        No orders yet. Create your first order above.
                    </p>
                </h:panelGroup>

                <h:panelGroup rendered="#{!orderBean.orders.isEmpty()}">
                    <div class="table-wrapper">
                        <h:dataTable value="#{orderBean.orders}"
                                     var="order"
                                     styleClass="data-table">
                            <h:column>
                                <f:facet name="header">Checkout Email</f:facet>
                                #{order.email}
                            </h:column>

                            <h:column>
                                <f:facet name="header">Subtotal</f:facet>
                                #{order.subtotal}
                            </h:column>

                            <h:column>
                                <f:facet name="header">Tax Total</f:facet>
                                #{order.taxTotal}
                            </h:column>

                            <h:column>
                                <f:facet name="header">Total</f:facet>
                                #{order.totalAmount}
                            </h:column>

                            <h:column>
                                <f:facet name="header">Status</f:facet>
                                #{order.status}
                            </h:column>

                            <h:column>
                                <f:facet name="header">Created</f:facet>
                                <h:outputText value="#{order.createdAt}" pattern="yyyy-MM-dd HH:mm"/>
                            </h:column>

                            <h:column>
                                <f:facet name="header">Payments</f:facet>
                                #{order.payments.size()}
                            </h:column>
                        </h:dataTable>
                    </div>
                </h:panelGroup>
            </section>
        </div>
    </main>

    <ui:include src="/WEB-INF/includes/footer.xhtml" />
</h:body>
</html>
