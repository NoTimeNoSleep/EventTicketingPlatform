<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Orders</title>
</h:head>

<h:body>
    <h1>Orders</h1>

    <h:dataTable value="#{orderBean.orders}" var="order" border="1">
        <h:column>
            <f:facet name="header">User</f:facet>
            #{order.user.email}
        </h:column>

        <h:column>
            <f:facet name="header">Subtotal</f:facet>
            #{order.subtotal}
        </h:column>

        <h:column>
            <f:facet name="header">Tax Total</f:facet>
            #{order.taxTotal}
        </h:column>

        <h:column>
            <f:facet name="header">Total</f:facet>
            #{order.totalAmount}
        </h:column>

        <h:column>
            <f:facet name="header">Status</f:facet>
            #{order.status}
        </h:column>

        <h:column>
            <f:facet name="header">Created</f:facet>
            #{order.createdAt}
        </h:column>
    </h:dataTable>
</h:body>
</html>
