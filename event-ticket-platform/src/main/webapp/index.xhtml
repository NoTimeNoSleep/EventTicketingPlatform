<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://java.sun.com/jsf/facelets">
<h:head>
    <title>Event Ticket Platform</title>
    <style>
        .container { max-width: 1100px; margin: 1rem auto; padding: 0 1rem; }
        .hero { background: #f1f5f9; padding: 2.5rem 1.25rem; border-radius: 8px; text-align: center; margin-bottom: 1.25rem; }
        .hero h2 { margin: 0 0 .5rem 0; font-size: 2rem; }
        .hero p { margin: 0; color: #555; }
        .cta { display: inline-block; margin-top: 1rem; padding: .6rem 1rem; background: #007bff; color: #fff; border-radius: 4px; text-decoration: none; }

        .section-title { font-size: 1.25rem; margin: .5rem 0; }
        .scroll-row { display: flex; gap: 1rem; overflow-x: auto; padding: .5rem 0; }
        .event-card { min-width: 200px; background: #fff; border: 1px solid #e3e3e3; border-radius: 6px; padding: .75rem; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
        .event-card h3 { margin: 0 0 .25rem 0; font-size: 1rem; }
        .event-card p { margin: 0; color: #666; font-size: .9rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-top: .5rem; }
        .card { background: #fff; border: 1px solid #e3e3e3; border-radius: 6px; padding: .75rem; }
        .card h4 { margin: 0 0 .25rem 0; font-size: 1rem; }
        .muted { color: #666; font-size: .9rem; }
    </style>
</h:head>

<ui:include src="/WEB-INF/includes/navbar.xhtml" />

<h:body>
    <div class="container">
        <!-- HERO -->
        <section class="hero">
            <h2>Discover Events Near You</h2>
            <p>Find concerts, theater, sports and more — book tickets in a few clicks.</p>
            <div>
                <h:link outcome="/events.xhtml" value="Browse Events" styleClass="cta" />
            </div>
        </section>

        <!-- TOP EVENTS HORIZONTAL LIST -->
        <section>
            <div class="section-title">Top Events</div>
            <div class="scroll-row" aria-label="Top events">
                <ui:repeat value="#{eventBean.events}" var="e" varStatus="s">
                    <h:panelGroup rendered="#{s.index lt 5}" layout="block" styleClass="event-card">
                        <h3><h:link outcome="/events.xhtml" value="#{e.name}" /></h3>
                        <p class="muted">#{e.dateTime} • #{e.venue.name}</p>
                    </h:panelGroup>
                </ui:repeat>
            </div>
        </section>

        <!-- RECOMMENDED GRID -->
        <section style="margin-top:1rem;">
            <div class="section-title">Recommended For You</div>
            <div class="grid">
                <ui:repeat value="#{eventBean.events}" var="e" varStatus="s">
                    <h:panelGroup rendered="#{s.index ge 5 and s.index lt 11}" layout="block" styleClass="card">
                        <h4><h:link outcome="/events.xhtml" value="#{e.name}" /></h4>
                        <p class="muted">#{e.dateTime} • #{e.venue.name}</p>
                    </h:panelGroup>
                </ui:repeat>
            </div>
        </section>
    </div>
</h:body>
</html>
