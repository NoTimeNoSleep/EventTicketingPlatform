<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <title>Payments</title>
    <h:outputStylesheet library="css" name="site.css" />
</h:head>


<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <main class="main-content">

        <h1>Payments</h1>

        <h:dataTable value="#{paymentBean.payments}" var="payment" border="1">
            <h:column>
                <f:facet name="header">Id</f:facet>
                #{payment.id}
            </h:column>

            <h:column>
                <f:facet name="header">Order Id</f:facet>
                #{payment.order.id}
            </h:column>

            <h:column>
                <f:facet name="header">Amount</f:facet>
                #{payment.amount}
            </h:column>

            <h:column>
                <f:facet name="header">Payment Method</f:facet>
                #{payment.paymentMethod}
            </h:column>

            <h:column>
                <f:facet name="header">Status</f:facet>
                #{payment.paymentStatus}
            </h:column>

            <h:column>
                <f:facet name="header">Created At</f:facet>
                #{payment.createdAt}
            </h:column>

            <h:column>
                <f:facet name="header">Paid At</f:facet>
                #{payment.paidAt}
            </h:column>
        </h:dataTable>
    </main>

    <ui:include src="/WEB-INF/includes/footer.xhtml" />
</h:body>
</html>
