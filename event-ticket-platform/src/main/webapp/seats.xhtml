<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Seats</title>
    <h:outputStylesheet library="css" name="site.css" />
    <h:outputStylesheet library="css" name="index.css" />
    <h:outputStylesheet library="css" name="style.css" />

</h:head>

<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <main class="main-content">
        <div class="container">

            <section class="section">
                <h1>Seats</h1>
                <p class="muted">
                    <h:outputText value="Manage seats for #{seatBean.selectedVenue.name}"
                                  rendered="#{seatBean.venueSelected}" />
                    <h:outputText value="Select a venue to manage its seats."
                                  rendered="#{not seatBean.venueSelected}" />
                </p>
            </section>

            <h:messages globalOnly="true" />

            <h:panelGroup layout="block" styleClass="card" rendered="#{not seatBean.venueSelected}">
                <h2>Select venue</h2>

                <div class="table-wrapper">
                    <h:dataTable value="#{seatBean.venues}" var="venue" styleClass="data-table">
                        <h:column>
                            <f:facet name="header">Name</f:facet>
                            #{venue.name}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Location</f:facet>
                            #{venue.location}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Seat count</f:facet>
                            #{seatBean.seatCounts[venue.id]}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Actions</f:facet>
                            <h:link value="Manage seats"
                                    outcome="seats"
                                    styleClass="btn-primary btn-table">
                                <f:param name="venueId" value="#{venue.id}" />
                            </h:link>
                        </h:column>
                    </h:dataTable>
                </div>
            </h:panelGroup>

            <h:panelGroup layout="block" styleClass="card" rendered="#{seatBean.venueSelected}">
                <h2>Generate seats</h2>

                <h:form id="seatForm">
                    <h:inputHidden value="#{seatBean.selectedVenueId}" />

                    <div class="form-grid">
                        <div>
                            <h:outputLabel value="Section:" />
                            <h:inputText id="section"
                                         value="#{seatBean.section}"
                                         required="true"
                                         requiredMessage="Section is required." />
                            <h:message for="section" />
                        </div>

                        <div>
                            <h:outputLabel value="Row start:" />
                            <h:inputText id="rowStart"
                                         value="#{seatBean.rowStart}"
                                         required="true"
                                         requiredMessage="Row start is required."
                                         converterMessage="Row start must be a number."
                                         validatorMessage="Row start must be at least 1.">
                                <f:validateLongRange minimum="1" />
                            </h:inputText>
                            <h:message for="rowStart" />
                        </div>

                        <div>
                            <h:outputLabel value="Row end:" />
                            <h:inputText id="rowEnd"
                                         value="#{seatBean.rowEnd}"
                                         required="true"
                                         requiredMessage="Row end is required."
                                         converterMessage="Row end must be a number."
                                         validatorMessage="Row end must be at least 1.">
                                <f:validateLongRange minimum="1" />
                            </h:inputText>
                            <h:message for="rowEnd" />
                        </div>

                        <div>
                            <h:outputLabel value="Seats per row:" />
                            <h:inputText id="seatsPerRow"
                                         value="#{seatBean.seatsPerRow}"
                                         required="true"
                                         requiredMessage="Seats per row is required."
                                         converterMessage="Seats per row must be a number."
                                         validatorMessage="Seats per row must be at least 1.">
                                <f:validateLongRange minimum="1" />
                            </h:inputText>
                            <h:message for="seatsPerRow" />
                        </div>
                    </div>

                    <h:commandButton value="Generate seats"
                                     action="#{seatBean.createSeats}"
                                     styleClass="btn-primary">
                        <f:param name="venueId" value="#{seatBean.selectedVenueId}" />
                    </h:commandButton>
                </h:form>
            </h:panelGroup>

            <h:panelGroup layout="block" styleClass="card" rendered="#{seatBean.venueSelected}">
                <h2>Existing seat groups</h2>

                <div class="table-wrapper">
                    <h:dataTable value="#{seatBean.seatGroups}" var="seatGroup" styleClass="data-table">
                        <h:column>
                            <f:facet name="header">Section</f:facet>
                            #{seatGroup.section}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Row</f:facet>
                            #{seatGroup.row}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Seat numbers</f:facet>
                            #{seatGroup.seatNumbers}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Count</f:facet>
                            #{seatGroup.seatCount}
                        </h:column>
                    </h:dataTable>
                </div>
            </h:panelGroup>

        </div>
    </main>

    <ui:include src="/WEB-INF/includes/footer.xhtml" />
</h:body>
</html>
