<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core" 
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Seats</title>
    <h:outputStylesheet library="css" name="site.css" />
</h:head>

<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <main class="main-content">

        <h1>Seats</h1>

        <h:dataTable value="#{seatBean.seats}" var="seat" border="1">
            <h:column>
                <f:facet name="header">ID</f:facet>
                #{seat.id}
            </h:column>

            <h:column>
                <f:facet name="header">Venue</f:facet>
                #{seat.venue.name}
            </h:column>

            <h:column>
                <f:facet name="header">Section</f:facet>
                #{seat.section}
            </h:column>

            <h:column>
                <f:facet name="header">Row</f:facet>
                #{seat.row}
            </h:column>

            <h:column>
                <f:facet name="header">Number</f:facet>
                #{seat.number}
            </h:column>
        </h:dataTable>
    </main>

    <ui:include src="/WEB-INF/includes/footer.xhtml" />
</h:body>
</html>
