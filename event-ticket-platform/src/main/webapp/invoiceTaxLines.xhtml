<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core" 
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Invoice Tax Lines</title>
    <h:outputStylesheet library="css" name="site.css" />
</h:head>

<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <main class="main-content">

        <h1>Invoice Tax Lines</h1>

        <h:dataTable value="#{invoiceTaxLineBean.invoiceTaxLines}" var="taxLine" border="1">

            <h:column>
                <f:facet name="header">ID</f:facet>
                #{taxLine.id}
            </h:column>

            <h:column>
                <f:facet name="header">Invoice ID</f:facet>
                #{taxLine.invoice.id}
            </h:column>

            <h:column>
                <f:facet name="header">Name</f:facet>
                #{taxLine.name}
            </h:column>

            <h:column>
                <f:facet name="header">Rate</f:facet>
                #{taxLine.rate}
            </h:column>

            <h:column>
                <f:facet name="header">Amount</f:facet>
                #{taxLine.amount}
            </h:column>
        </h:dataTable>
    </main>

    <ui:include src="/WEB-INF/includes/footer.xhtml" />
</h:body>
</html>
