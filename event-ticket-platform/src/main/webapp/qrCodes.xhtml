<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <title>QR Codes</title>
</h:head>


<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <h1>QR Codes</h1>

    <h:dataTable value="#{qrCodeBean.qrCodes}" var="qr" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{qr.id}
        </h:column>

        <h:column>
            <f:facet name="header">TicketId</f:facet>
            #{qr.ticket.id}
        </h:column>

        <h:column>
            <f:facet name="header">Code Value</f:facet>
            #{qr.codeValue}
        </h:column>

        <h:column>
            <f:facet name="header">Generated At</f:facet>
            #{qr.generatedAt}
        </h:column>

        <h:column>
            <f:facet name="header">Status</f:facet>
            #{qr.status}
        </h:column>
    </h:dataTable>
</h:body>
</html>
