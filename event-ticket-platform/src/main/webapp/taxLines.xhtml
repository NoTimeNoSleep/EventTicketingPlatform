<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Tax Lines</title>
    <h:outputStylesheet library="css" name="site.css" />
    <h:outputStylesheet library="css" name="index.css" />
    <h:outputStylesheet library="css" name="style.css" />
</h:head>

<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <main class="main-content">
        <div class="container">

            <section class="section">
                <h1>Tax Lines</h1>
                <p class="muted">Review tax amounts that were applied to orders and tickets.</p>
            </section>

            <section class="card">
                <h2>Existing tax lines</h2>

                <div class="table-wrapper">
                    <h:dataTable value="#{taxLineBean.taxLines}"
                                 var="taxLine"
                                 styleClass="data-table">

                        <h:column>
                            <f:facet name="header">ID</f:facet>
                            #{taxLine.id}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Name</f:facet>
                            #{taxLine.name}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Rate</f:facet>
                            #{taxLine.rate}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Amount</f:facet>
                            #{taxLine.amount}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Order</f:facet>
                            <!-- TODO: replace this with a link to a specific order details page when implemented -->
                            <h:link value="#{taxLine.order.id}"
                                    outcome="orders"
                                    styleClass="table-link" />
                        </h:column>

                        <h:column>
                            <f:facet name="header">Ticket</f:facet>
                            <!-- TODO: replace this with a link to a specific ticket details page when implemented -->
                            <h:link value="#{taxLine.ticket.id}"
                                    outcome="tickets"
                                    styleClass="table-link"
                                    rendered="#{not empty taxLine.ticket}" />
                            <h:outputText value="No ticket"
                                          rendered="#{empty taxLine.ticket}" />
                        </h:column>

                    </h:dataTable>
                </div>
            </section>

        </div>
    </main>

    <ui:include src="/WEB-INF/includes/footer.xhtml" />
</h:body>
</html>
