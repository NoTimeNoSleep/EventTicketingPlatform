<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Venues</title>
    <h:outputStylesheet library="css" name="site.css" />
    <h:outputStylesheet library="css" name="index.css" />
    <h:outputStylesheet library="css" name="style.css" />
</h:head>

<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <main class="main-content">
        <div class="container">

            <h1>Venues</h1>
            <p>Create and manage venues used by events.</p>

            <section class="card">
                <h2>Create new venue</h2>

                <h:form>
                    <div class="form-grid">
                        <div>
                            <h:outputLabel value="Name:" />
                            <h:inputText value="#{venueBean.newVenue.name}" />
                        </div>

                        <div>
                            <h:outputLabel value="Location:" />
                            <h:inputText value="#{venueBean.newVenue.location}" />
                        </div>
                    </div>

                    <h:commandButton value="Create venue"
                                     action="#{venueBean.createVenue}"
                                     styleClass="btn-primary" />
                </h:form>
            </section>

            <section class="card">
                <h2>Existing venues</h2>

                <div class="table-wrapper">
                    <h:dataTable value="#{venueBean.venues}"
                                 var="venue"
                                 styleClass="data-table">

                        <h:column>
                            <f:facet name="header">Name</f:facet>
                            #{venue.name}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Location</f:facet>
                            #{venue.location}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Seats</f:facet>

                            <ui:fragment rendered="#{empty venue.seats}">
                                -
                            </ui:fragment>

                            <ui:repeat value="#{venue.seats}" var="seat">
                                #{seat.section}-#{seat.row}-#{seat.number}<br />
                            </ui:repeat>
                        </h:column>

                    </h:dataTable>
                </div>
            </section>

        </div>
    </main>

    <ui:include src="/WEB-INF/includes/footer.xhtml" />
</h:body>
</html>
