<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <title>Venues</title>
</h:head>


<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <h1>Venues</h1>

    <h2>Create new venue</h2>

    <h:form>
        <h:panelGrid columns="2">
            <h:outputLabel value="Name:" />
            <h:inputText value="#{venueBean.newVenue.name}" />

            <h:outputLabel value="Location:" />
            <h:inputText value="#{venueBean.newVenue.location}" />
        </h:panelGrid>

        <h:commandButton value="Create venue" action="#{venueBean.createVenue}" />
    </h:form>

    <h:dataTable value="#{venueBean.venues}" var="venue" border="1">
        <h:column>
            <f:facet name="header">Name</f:facet>
            <h:outputText value="#{venue.name}" />
        </h:column>

        <h:column>
            <f:facet name="header">Location</f:facet>
            <h:outputText value="#{venue.location}" />
        </h:column>
    </h:dataTable>
</h:body>
</html>
