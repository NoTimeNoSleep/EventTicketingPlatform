<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Venues</title>
    <h:outputStylesheet name="css/style.css" />
</h:head>


<h:body>
    <ui:include src="/WEB-INF/includes/navbar.xhtml" />

    <div class="page-container">

        <div class="page-header">
            <h1>Venues</h1>
            <p>Create and manage event venues used by the ticket platform.</p>
        </div>

        <div class="card">
            <h2>Create new venue</h2>

            <h:form styleClass="form">
                <div class="form-grid">
                    <div class="form-group">
                        <h:outputLabel value="Name:" />
                        <h:inputText value="#{venueBean.newVenue.name}" styleClass="input" />
                    </div>

                    <div class="form-group">
                        <h:outputLabel value="Location:" />
                        <h:inputText value="#{venueBean.newVenue.location}" styleClass="input" />
                    </div>
                </div>

                <h:commandButton value="Create venue"
                                 action="#{venueBean.createVenue}"
                                 styleClass="btn-primary" />
            </h:form>
        </div>

        <div class="card">
            <h2>Existing venues</h2>

            <h:dataTable value="#{venueBean.venues}" var="venue" styleClass="data-table">
                <h:column>
                    <f:facet name="header">Name</f:facet>
                    <h:outputText value="#{venue.name}" />
                </h:column>

                <h:column>
                    <f:facet name="header">Location</f:facet>
                    <h:outputText value="#{venue.location}" />
                </h:column>
            </h:dataTable>
        </div>

    </div>
</h:body>
</html>
